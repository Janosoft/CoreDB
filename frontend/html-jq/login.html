<!doctype html>
<html lang="es-ar">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CoreDB - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-4.0.0.min.js" integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

    <div class="col-10 col-md-4">
        <form id="loginForm">
            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="emailInput" placeholder="Email" required>
                <label for="emailInput">Email</label>
            </div>

            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="passwordInput" placeholder="Contraseña" required>
                <label for="passwordInput">Contraseña</label>
            </div>

            <button type="submit" name="backend" value="php" class="btn btn-primary w-100 mb-2">Iniciar Sesión (PHP backend)</button>
        </form>
    </div>

    <script src="login.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
