<!doctype html>
<html lang="es-ar">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CoreDB - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

    <div class="col-10 col-md-4">
        <form id="loginForm">
            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="emailInput" placeholder="Email" required>
                <label for="emailInput">Email</label>
            </div>

            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="passwordInput" placeholder="Contraseña" required>
                <label for="passwordInput">Contraseña</label>
            </div>

            <button type="submit" name="backend" value="php" class="btn btn-primary w-100 mb-2">Iniciar Sesión (PHP backend)</button>
        </form>
        <script>
            document.getElementById("loginForm").addEventListener("submit", async (e) => {
                e.preventDefault();

                // 1) Guardar el texto original y deshabilitar el botón
                const button = e.submitter;
                const originalText = button.textContent;
                button.disabled = true;
                button.textContent = "Espere...";

                // 2) Obtener datos del formulario
                let result;
                try {
                    const email = document.getElementById("emailInput").value;
                    const password = document.getElementById("passwordInput").value;
                    const backend = e.submitter.value; // Define el backend a utilizar

                    // 3) Llamada al backend correspondiente

                    if (backend === "php") {
                        result = await loginPHP(email, password);
                    }

                    /*
                    // Para usar cuando hayan más backends
                    else if (backend === "node") {
                        result = await loginNode(email, password);
                    }
                    */
                } catch (error) {

                    console.error(error);
                    alert("Error inesperado");

                } finally {
                    // 4) Restaurar el botón
                    button.disabled = false;
                    button.textContent = originalText;

                    // 5) Mostrar el resultado
                    if (result?.success) alert("Login exitoso: " + result.data.email + " - " + result.data.codigo);
                    else if (result) alert(result.error);
                    else alert("Error inesperado");
                }
            });
        </script>
    </div>

    <script src="login.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
